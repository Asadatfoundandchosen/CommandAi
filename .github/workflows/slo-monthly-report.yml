name: SLO monthly report

on:
  schedule:
    # First day of month, 09:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SLO Markdown
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }}
        run: |
          if [ -z "${PROMETHEUS_URL:-}" ]; then
            echo "PROMETHEUS_URL secret not set — skipping live query; emitting template only."
            echo "## SLO report (dry run — set PROMETHEUS_URL)" > slo-report.md
            echo "Configure secrets per docs/runbooks/slo-monthly-report.md" >> slo-report.md
          else
            bash scripts/slo-monthly-report.sh > slo-report.md
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: slo-report-${{ github.run_id }}
          path: slo-report.md

      # Uncomment and set secrets (SMTP or provider-specific action) to email the report.
