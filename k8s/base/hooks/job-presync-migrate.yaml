# PreSync: run DB migrations before workloads update (replace image/command with your migrator).
apiVersion: batch/v1
kind: Job
metadata:
  name: platform-api-presync-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Replace with: node migrate.js or atlas migrate apply"
              exit 0
