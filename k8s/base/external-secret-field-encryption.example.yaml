# Sync FIELD_ENCRYPTION_KEY from Vault KV into the API Deployment.
# Requires ClusterSecretStore `vault-backend` and path secret/platform/<env>/encryption
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-api-encryption
  namespace: 1commandai-apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: platform-api-encryption
    creationPolicy: Owner
  data:
    - secretKey: FIELD_ENCRYPTION_KEY
      remoteRef:
        key: secret/data/platform/prod/encryption
        property: field_encryption_key
    - secretKey: APP_KMS_KEY_ARN
      remoteRef:
        key: secret/data/platform/prod/encryption
        property: kms_key_arn
