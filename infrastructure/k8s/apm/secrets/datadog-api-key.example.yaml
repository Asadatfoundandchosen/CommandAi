# Example only — replace with ExternalSecrets / SealedSecrets in real clusters.
# kubectl -n datadog create secret generic datadog-secret --from-literal api-key='...'
apiVersion: v1
kind: Secret
metadata:
  name: datadog-secret
  namespace: datadog
type: Opaque
stringData:
  api-key: "REPLACE_WITH_DATADOG_API_KEY"
