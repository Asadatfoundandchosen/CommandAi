# Apply per app namespace (dev/staging/prod). Prometheus must be allowed to scrape that namespace
# (kube-prometheus-stack: prometheus.prometheusSpec.serviceMonitorNamespaceSelector / podMonitorNamespaceSelector).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-api
  labels:
    app.kubernetes.io/part-of: 1commandai
    # Must match kube-prometheus-stack Helm release label if serviceMonitorSelectorNilUsesHelmValues is true.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
