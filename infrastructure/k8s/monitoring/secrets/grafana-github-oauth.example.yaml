# Create Secret in `monitoring` (or your Grafana namespace), then wire Grafana via Helm values
# (grafana.ini auth.github + envFromSecret / GF_AUTH_GITHUB_*).
apiVersion: v1
kind: Secret
metadata:
  name: grafana-github-oauth
  namespace: monitoring
type: Opaque
stringData:
  GF_AUTH_GITHUB_CLIENT_ID: REPLACE_GITHUB_OAUTH_APP_CLIENT_ID
  GF_AUTH_GITHUB_CLIENT_SECRET: REPLACE_GITHUB_OAUTH_APP_CLIENT_SECRET
