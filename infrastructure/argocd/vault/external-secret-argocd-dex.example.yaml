# Example: sync Dex GitHub OAuth client credentials from Vault using External Secrets Operator.
# Paths and ClusterSecretStore name are placeholders for your cluster.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-dex-github-from-vault
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: dex.github.clientID
      remoteRef:
        key: secret/data/platform/argocd/github-oauth
        property: client_id
    - secretKey: dex.github.clientSecret
      remoteRef:
        key: secret/data/platform/argocd/github-oauth
        property: client_secret
