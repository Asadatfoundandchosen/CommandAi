apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-api-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: 1commandai
    environment: dev
spec:
  project: "1commandai"
  source:
    repoURL: https://github.com/1commandai/platform.git
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: "1commandai-dev"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
