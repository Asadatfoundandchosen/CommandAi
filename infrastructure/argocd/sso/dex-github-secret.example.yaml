# Keys referenced by dex.config ($dex.github.clientID / $dex.github.clientSecret).
# Prefer ExternalSecrets from Vault; do not commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
type: Opaque
stringData:
  dex.github.clientID: REPLACE_WITH_GITHUB_OAUTH_APP_CLIENT_ID
  dex.github.clientSecret: REPLACE_WITH_GITHUB_OAUTH_APP_CLIENT_SECRET
